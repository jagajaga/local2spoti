<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Local2Spoti{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/ext/ws.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <header class="border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
    <a href="/dashboard" class="text-xl font-semibold">Local2Spoti</a>
    <nav class="flex gap-4 text-sm">
      <a href="/dashboard" class="hover:text-white">Dashboard</a>
      <a href="/scan" class="hover:text-white">Scan</a>
      <a href="/files" class="hover:text-white">Files</a>
      <a href="/review" class="hover:text-white">Review</a>
      <a href="/unmatched" class="hover:text-white">Unmatched</a>
    </nav>
  </header>
  <main class="max-w-6xl mx-auto p-6">{% block content %}{% endblock %}</main>

  <!-- WebSocket status badge — fades in only when the connection is
       degraded so it stays out of the way during normal use. Without this
       you don't know whether the server is up; FF tabs that lose the WS
       silently start to drift. -->
  <div id="ws-badge" class="fixed top-2 right-2 z-50 text-xs font-mono px-2 py-1 rounded bg-zinc-900/90 border opacity-0 pointer-events-none transition-opacity duration-200"></div>

  <div id="toasts" class="fixed bottom-4 right-4 z-50 space-y-2 max-w-md pointer-events-none"></div>
  <script>
    // Cap visible toasts so a reconnect storm (e.g. server restarting while
    // many in-flight HTMX requests time out) can't pile up unbounded DOM
    // and starve FF.
    var MAX_TOASTS = 5;

    function showToast(text, type) {
      var container = document.getElementById("toasts");
      while (container.children.length >= MAX_TOASTS) {
        container.removeChild(container.firstChild);
      }
      var el = document.createElement("div");
      var cls = type === "error"
        ? "bg-red-700 border-red-500"
        : type === "info"
          ? "bg-blue-800 border-blue-600"
          : "bg-emerald-800 border-emerald-600";
      el.className = cls + " border px-4 py-2 rounded shadow text-sm text-zinc-100 pointer-events-auto transition-opacity duration-300";
      el.textContent = text;
      container.appendChild(el);
      setTimeout(function () {
        el.style.opacity = "0";
        setTimeout(function () { el.remove(); }, 320);
      }, 4500);
    }

    // ─── WebSocket health indicator ────────────────────────────────────
    // htmx-ws auto-reconnects with backoff. We surface its state visually
    // so the user (and the dev) can see why progress bars stopped updating
    // — saves "is it broken or just reconnecting" guessing during
    // server restarts.
    (function () {
      var badge = document.getElementById("ws-badge");
      function setBadge(text, color, visible) {
        if (!badge) return;
        badge.textContent = text;
        badge.className = "fixed top-2 right-2 z-50 text-xs font-mono px-2 py-1 rounded bg-zinc-900/90 border pointer-events-none transition-opacity duration-200 " + color;
        badge.style.opacity = visible ? "1" : "0";
      }
      document.body.addEventListener("htmx:wsConnecting", function () {
        setBadge("● Reconnecting WebSocket…", "border-amber-500 text-amber-400", true);
      });
      document.body.addEventListener("htmx:wsOpen", function () {
        setBadge("● WebSocket connected", "border-emerald-500 text-emerald-400", true);
        setTimeout(function () { setBadge("", "", false); }, 1500);
      });
      document.body.addEventListener("htmx:wsClose", function () {
        setBadge("● WebSocket disconnected — retrying…", "border-red-500 text-red-400", true);
      });
      document.body.addEventListener("htmx:wsError", function () {
        setBadge("● WebSocket error — retrying…", "border-red-500 text-red-400", true);
      });
    })();

    function _summarize(data) {
      if (!data || typeof data !== "object") return "OK";
      if (data.message) return data.message;
      if (data.error) return data.error;
      // Endpoint-specific friendly summaries
      if (data.added !== undefined) return "Pushed " + data.added + " tracks (" + (data.playlists_created || 0) + " playlists)";
      if (data.approved !== undefined) {
        if (data.threshold !== undefined)
          return "Approved " + data.approved + " files (≥ " + Math.round(data.threshold * 100) + "%)";
        return "Approved " + data.approved + " files";
      }
      if (data.processed !== undefined) {
        var by = data.by_confidence
          ? " (" + Object.keys(data.by_confidence).map(function (k) { return k + ": " + data.by_confidence[k]; }).join(", ") + ")"
          : "";
        return "Processed " + data.processed + ", updated " + (data.updated || 0) + by;
      }
      if (data.updated !== undefined) return "Updated " + data.updated + " files";
      if (data.library_root !== undefined) return "Library set to " + data.library_root;
      if (data.threshold !== undefined) return "Threshold: " + data.threshold;
      if (data.ok) return "OK";
      return JSON.stringify(data);
    }

    document.body.addEventListener("htmx:afterRequest", function (evt) {
      var xhr = evt.detail.xhr;
      var failed = evt.detail.failed || xhr.status >= 400;
      var ct = xhr.getResponseHeader("Content-Type") || "";
      // Only toast on JSON. HTML responses are normal page replacements.
      if (!ct.includes("json")) {
        if (failed) showToast("Request failed (" + xhr.status + ")", "error");
        return;
      }
      var data = null;
      try { data = JSON.parse(xhr.responseText); } catch (_) {}
      if (failed) {
        var msg = (data && data.error) ? data.error : "Error " + xhr.status;
        showToast(msg, "error");
      } else {
        showToast(_summarize(data), "success");
      }
    });

    // Surface network failures (server crashed, port closed, etc.)
    document.body.addEventListener("htmx:sendError", function () {
      showToast("Network error — is the server still running?", "error");
    });
  </script>
</body>
</html>
